openapi: 3.0.3

info:
  title: FisioFlow API
  version: 1.0.0
  description: API for managing patients and physiotherapy appointments

servers:
  - url: http://localhost:3000

tags:
  - name: Patients
  - name: Appointments

paths:

  /patients:

    post:
      tags: [Patients]
      summary: Create patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePatientRequest'
      responses:
        '201':
          description: Patient created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
        '400':
          description: Invalid patient data
          content:
            application/json:
              example:
                message: "Invalid patient data"
        '500':
          description: Internal server error

    get:
      tags: [Patients]
      summary: List patients
      responses:
        '200':
          description: Patients retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Patient'
        '500':
          description: Internal server error
          content:
            application/json:
              example:
                message: "Error retrieving patients"

  /patients/{id}:

    patch:
      tags: [Patients]
      summary: Update patient (partial update)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePatientRequest'
      responses:
        '200':
          description: Patient updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
        '400':
          description: Invalid patient data
          content:
            application/json:
              example:
                message: "Invalid patient data"
        '404':
          description: Patient not found
          content:
            application/json:
              example:
                message: "Patient not found"

    delete:
      tags: [Patients]
      summary: Delete patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Patient deleted successfully
          content:
            application/json:
              example:
                message: "Patient deleted successfully"
        '404':
          description: Patient not found
          content:
            application/json:
              example:
                message: "Patient not found"

  /appointments:

    post:
      tags: [Appointments]
      summary: Create appointment
      description: Appointments cannot overlap on the same day.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAppointmentRequest'
      responses:
        '201':
          description: Appointment created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'

        '400':
          description: Invalid appointment data
          content:
            application/json:
              example:
                message: "Invalid appointment data"

        '404':
          description: Patient not found
          content:
            application/json:
              example:
                message: "Patient not found"

        '409':
          description: Schedule conflict detected
          content:
            application/json:
              example:
                message: "Schedule conflict detected"

    get:
      tags: [Appointments]
      summary: List appointments
      responses:
        '200':
          description: Appointments retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Appointment'

  /appointments/day/{date}:

    get:
      tags: [Appointments]
      summary: Get appointments by date
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
            format: date
            example: "2026-04-24"
      responses:
        '200':
          description: Appointments retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Appointment'
        '400':
          description: Invalid date format
          content:
            application/json:
              example:
                message: "Invalid date format"

components:

  schemas:

    CreatePatientRequest:
      type: object
      required: [name, age]
      properties:
        name:
          type: string
          example: Maria Souza
        phone:
          type: string
          example: "(85) 99999-0000"
        age:
          type: integer
          minimum: 1
          maximum: 120
          example: 35
        diagnosis:
          type: string
          example: Lower back pain

    UpdatePatientRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        age:
          type: integer
          minimum: 1
          maximum: 120
        diagnosis:
          type: string

    Patient:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Maria Souza
        phone:
          type: string
          example: "(85) 99999-0000"
        age:
          type: integer
          example: 35
        diagnosis:
          type: string
          example: Lower back pain
        createdAt:
          type: string
          format: date-time
          example: "2026-04-24T14:00:00.000Z"

    CreateAppointmentRequest:
      type: object
      required: [patientId, date, startTime, duration]
      properties:
        patientId:
          type: integer
          example: 1
        date:
          type: string
          format: date
          example: "2026-04-24"
        startTime:
          type: string
          pattern: ^\d{2}:\d{2}$
          example: "10:00"
        duration:
          type: integer
          minimum: 1
          example: 60

    Appointment:
      type: object
      properties:
        id:
          type: integer
          example: 1
        patientId:
          type: integer
          example: 1
        date:
          type: string
          format: date
          example: "2026-04-24"
        startTime:
          type: string
          example: "10:00"
        duration:
          type: integer
          example: 60
        endTime:
          type: string
          example: "11:00"
        createdAt:
          type: string
          format: date-time
          example: "2026-04-24T14:00:00.000Z"

    ErrorResponse:
      type: object
      properties:
        message:
          type: string